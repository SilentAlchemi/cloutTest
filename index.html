<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cloud Test</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4efe4;
      --panel: #fffaf0;
      --ink: #1f2933;
      --accent: #b45309;
      --line: #e5d5b8;
      --rainbow-red: #dc2626;
      --rainbow-orange: #f97316;
      --rainbow-yellow: #eab308;
      --rainbow-green: #22c55e;
      --rainbow-cyan: #06b6d4;
      --rainbow-blue: #3b82f6;
      --rainbow-purple: #a855f7;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top, #fff7e8 0%, var(--bg) 55%, #e8dcc4 100%);
      color: var(--ink);
      font: 16px/1.5 Georgia, "Times New Roman", serif;
    }

    main {
      width: min(560px, calc(100vw - 32px));
      padding: 32px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: color-mix(in srgb, var(--panel) 92%, white);
      box-shadow: 0 20px 50px rgba(31, 41, 51, 0.12);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 5vw, 3rem);
      line-height: 1;
    }

    .rainbow-text {
      background: linear-gradient(
        90deg,
        var(--rainbow-red),
        var(--rainbow-orange),
        var(--rainbow-yellow),
        var(--rainbow-green),
        var(--rainbow-cyan),
        var(--rainbow-blue),
        var(--rainbow-purple),
        var(--rainbow-red)
      );
      background-size: 300% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
      animation: rainbow-text 4s linear infinite;
    }

    p {
      margin: 0 0 12px;
    }

    .game {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--line);
    }

    .game-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 16px;
      font-weight: 700;
    }

    .game-stat {
      padding: 6px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff7e8;
    }

    .game-board {
      position: relative;
      min-height: 220px;
      overflow: hidden;
      border: 2px dashed var(--line);
      border-radius: 16px;
      background:
        radial-gradient(circle at 15% 20%, rgba(168, 85, 247, 0.18), transparent 28%),
        radial-gradient(circle at 85% 75%, rgba(6, 182, 212, 0.18), transparent 28%),
        #fffdf7;
    }

    .target {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 64px;
      height: 64px;
      border: 0;
      border-radius: 50%;
      background: conic-gradient(
        from 0deg,
        var(--rainbow-red),
        var(--rainbow-orange),
        var(--rainbow-yellow),
        var(--rainbow-green),
        var(--rainbow-cyan),
        var(--rainbow-blue),
        var(--rainbow-purple),
        var(--rainbow-red)
      );
      box-shadow: 0 12px 24px rgba(31, 41, 51, 0.18);
      color: white;
      cursor: pointer;
      font-size: 1.7rem;
      transform: translate(-50%, -50%);
      transition: left 120ms ease, top 120ms ease, transform 120ms ease;
    }

    .target:hover,
    .target:focus-visible {
      transform: translate(-50%, -50%) scale(1.08);
    }

    .target:focus-visible,
    .start-button:focus-visible {
      outline: 3px solid var(--rainbow-blue);
      outline-offset: 3px;
    }

    .target:disabled {
      cursor: not-allowed;
      filter: grayscale(0.6);
      opacity: 0.75;
    }

    .game-message {
      min-height: 1.5em;
      margin: 14px 0 0;
      font-weight: 700;
    }

    .start-button {
      margin-top: 16px;
      padding: 10px 16px;
      border: 0;
      border-radius: 999px;
      background: var(--accent);
      color: white;
      cursor: pointer;
      font: inherit;
      font-weight: 700;
    }

    .start-button:hover {
      background: #92400e;
    }

    @keyframes rainbow-text {
      from {
        background-position: 0% 50%;
      }

      to {
        background-position: 100% 50%;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .rainbow-text {
        animation: none;
        background: none;
        -webkit-text-fill-color: var(--ink);
        color: var(--ink);
      }

      .target {
        transition: none;
      }
    }

    .stamp {
      display: inline-block;
      margin-top: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      background: #fff1d6;
      color: var(--accent);
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <main>
    <h1 class="rainbow-text">Click the Rainbow</h1>
    <p class="rainbow-text">Catch the rainbow as many times as you can before the timer runs out.</p>
    <p class="rainbow-text">Press start, then click the moving rainbow target for points.</p>

    <section class="game" aria-label="Click the Rainbow game">
      <div class="game-stats" aria-live="polite">
        <span class="game-stat">Score: <span id="score">0</span></span>
        <span class="game-stat">Time: <span id="time">10</span>s</span>
      </div>

      <div class="game-board" id="game-board">
        <button class="target" id="target" type="button" aria-label="Rainbow target" disabled>🌈</button>
      </div>

      <p class="game-message" id="message">Click start to play a 10 second round.</p>
      <button class="start-button" id="start-button" type="button">Start game</button>
    </section>

    <div class="stamp">Version 3 hello!</div>
  </main>

  <script>
    const board = document.querySelector('#game-board');
    const target = document.querySelector('#target');
    const scoreDisplay = document.querySelector('#score');
    const timeDisplay = document.querySelector('#time');
    const message = document.querySelector('#message');
    const startButton = document.querySelector('#start-button');

    const roundLength = 10;
    let score = 0;
    let timeLeft = roundLength;
    let timerId;

    function moveTarget() {
      const boardRect = board.getBoundingClientRect();
      const targetSize = target.offsetWidth;
      const padding = targetSize / 2 + 8;
      const x = padding + Math.random() * (boardRect.width - padding * 2);
      const y = padding + Math.random() * (boardRect.height - padding * 2);

      target.style.left = `${x}px`;
      target.style.top = `${y}px`;
    }

    function endGame() {
      clearInterval(timerId);
      target.disabled = true;
      startButton.disabled = false;
      startButton.textContent = 'Play again';
      message.textContent = `Time! You caught ${score} rainbow${score === 1 ? '' : 's'}.`;
    }

    function startGame() {
      score = 0;
      timeLeft = roundLength;
      scoreDisplay.textContent = score;
      timeDisplay.textContent = timeLeft;
      message.textContent = 'Go! Catch the rainbow!';
      target.disabled = false;
      startButton.disabled = true;
      moveTarget();
      target.focus();

      clearInterval(timerId);
      timerId = setInterval(() => {
        timeLeft -= 1;
        timeDisplay.textContent = timeLeft;

        if (timeLeft <= 0) {
          endGame();
        }
      }, 1000);
    }

    target.addEventListener('click', () => {
      if (target.disabled) {
        return;
      }

      score += 1;
      scoreDisplay.textContent = score;
      message.textContent = `Nice! Score: ${score}`;
      moveTarget();
    });

    startButton.addEventListener('click', startGame);
    window.addEventListener('resize', moveTarget);
  </script>
</body>
</html>
