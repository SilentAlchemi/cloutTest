<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Click the Rainbow Game</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f4efe4;
      color: #1f2933;
      font: 16px/1.5 Arial, Helvetica, sans-serif;
    }

    main {
      width: min(620px, calc(100vw - 32px));
      padding: 28px;
      border: 4px solid #f97316;
      border-radius: 20px;
      background: #fffaf0;
      box-shadow: 0 20px 50px rgba(31, 41, 51, 0.14);
    }

    h1 {
      margin: 0 0 8px;
      color: #7c2d12;
      font-size: clamp(2rem, 6vw, 3.5rem);
      line-height: 1;
    }

    p { margin: 0 0 12px; }

    .game-banner {
      margin: 0 0 18px;
      padding: 10px 12px;
      border-radius: 12px;
      background: #dcfce7;
      color: #166534;
      font-weight: 700;
    }

    .game {
      margin-top: 22px;
      padding: 18px;
      border: 3px solid #3b82f6;
      border-radius: 18px;
      background: #ffffff;
    }

    .game h2 {
      margin: 0 0 10px;
      color: #1d4ed8;
      font-size: 1.35rem;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin: 16px 0;
    }

    button {
      border: 0;
      border-radius: 999px;
      background: #b45309;
      color: #ffffff;
      cursor: pointer;
      font: inherit;
      font-weight: 700;
      padding: 12px 18px;
    }

    button:hover { background: #92400e; }

    button:focus-visible {
      outline: 3px solid #2563eb;
      outline-offset: 3px;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.7;
    }

    .stat {
      display: inline-block;
      padding: 8px 12px;
      border: 2px solid #e5d5b8;
      border-radius: 999px;
      background: #fff7e8;
      font-weight: 700;
    }

    .board {
      position: relative;
      min-height: 240px;
      overflow: hidden;
      border: 4px dashed #a855f7;
      border-radius: 18px;
      background: #f8fafc;
    }

    .target {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 76px;
      height: 76px;
      padding: 0;
      background: linear-gradient(135deg, #ef4444, #f97316, #eab308, #22c55e, #06b6d4, #3b82f6, #a855f7);
      border: 4px solid #ffffff;
      border-radius: 50%;
      box-shadow: 0 12px 28px rgba(31, 41, 51, 0.25);
      font-size: 2rem;
      transform: translate(-50%, -50%);
    }

    .message {
      min-height: 1.5em;
      margin-top: 14px;
      font-weight: 700;
    }

    .stamp {
      display: inline-block;
      margin-top: 18px;
      padding: 8px 12px;
      border-radius: 999px;
      background: #fff1d6;
      color: #b45309;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <main>
    <div class="game-banner">This is the committed index.html game page — not the old Cloud Test placeholder.</div>
    <h1>Click the Rainbow Game</h1>
    <p>Press start, then click the rainbow target as many times as you can in 10 seconds.</p>

    <section class="game" aria-label="Click the Rainbow game">
      <h2>Game area</h2>
      <div class="controls" aria-live="polite">
        <button id="start-button" type="button">Start game</button>
        <span class="stat">Score: <span id="score">0</span></span>
        <span class="stat">Time: <span id="time">10</span>s</span>
      </div>

      <div class="board" id="game-board">
        <button class="target" id="target" type="button" aria-label="Rainbow target" disabled>🌈</button>
      </div>

      <p class="message" id="message">Click Start game to begin.</p>
    </section>

    <div class="stamp">Version 6 plain visible game</div>
  </main>

  <script>
    const board = document.querySelector('#game-board');
    const target = document.querySelector('#target');
    const startButton = document.querySelector('#start-button');
    const scoreDisplay = document.querySelector('#score');
    const timeDisplay = document.querySelector('#time');
    const message = document.querySelector('#message');

    const roundSeconds = 10;
    let score = 0;
    let timeLeft = roundSeconds;
    let timerId = null;

    function moveTarget() {
      const boardRect = board.getBoundingClientRect();
      const targetSize = target.offsetWidth;
      const padding = targetSize / 2 + 10;
      const maxX = Math.max(padding, boardRect.width - padding);
      const maxY = Math.max(padding, boardRect.height - padding);
      const x = padding + Math.random() * (maxX - padding);
      const y = padding + Math.random() * (maxY - padding);

      target.style.left = `${x}px`;
      target.style.top = `${y}px`;
    }

    function endGame() {
      clearInterval(timerId);
      timerId = null;
      target.disabled = true;
      startButton.disabled = false;
      startButton.textContent = 'Play again';
      message.textContent = `Round over. You clicked ${score} rainbow${score === 1 ? '' : 's'}!`;
    }

    function startGame() {
      score = 0;
      timeLeft = roundSeconds;
      scoreDisplay.textContent = score;
      timeDisplay.textContent = timeLeft;
      message.textContent = 'Go! Click the rainbow target!';
      target.disabled = false;
      startButton.disabled = true;
      moveTarget();
      target.focus();

      clearInterval(timerId);
      timerId = setInterval(() => {
        timeLeft -= 1;
        timeDisplay.textContent = timeLeft;

        if (timeLeft <= 0) {
          endGame();
        }
      }, 1000);
    }

    target.addEventListener('click', () => {
      if (target.disabled) {
        return;
      }

      score += 1;
      scoreDisplay.textContent = score;
      message.textContent = `Nice click! Score: ${score}`;
      moveTarget();
    });

    startButton.addEventListener('click', startGame);
    window.addEventListener('resize', moveTarget);
  </script>
</body>
</html>
