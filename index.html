<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cloud Test</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4efe4;
      --panel: #fffaf0;
      --ink: #1f2933;
      --accent: #b45309;
      --line: #e5d5b8;
      --rainbow-red: #dc2626;
      --rainbow-orange: #f97316;
      --rainbow-yellow: #eab308;
      --rainbow-green: #22c55e;
      --rainbow-cyan: #06b6d4;
      --rainbow-blue: #3b82f6;
      --rainbow-purple: #a855f7;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top, #fff7e8 0%, var(--bg) 55%, #e8dcc4 100%);
      color: var(--ink);
      font: 16px/1.5 Georgia, "Times New Roman", serif;
    }

    main {
      width: min(560px, calc(100vw - 32px));
      padding: 32px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: color-mix(in srgb, var(--panel) 92%, white);
      box-shadow: 0 20px 50px rgba(31, 41, 51, 0.12);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 5vw, 3rem);
      line-height: 1;
    }

    .rainbow-text {
      background: linear-gradient(
        90deg,
        var(--rainbow-red),
        var(--rainbow-orange),
        var(--rainbow-yellow),
        var(--rainbow-green),
        var(--rainbow-cyan),
        var(--rainbow-blue),
        var(--rainbow-purple),
        var(--rainbow-red)
    main h1,
    main p {
      background: linear-gradient(
        90deg,
        #dc2626,
        #f97316,
        #eab308,
        #22c55e,
        #06b6d4,
        #3b82f6,
        #a855f7,
        #dc2626
      );
      background-size: 300% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
      animation: rainbow-text 4s linear infinite;
    }

    p {
      margin: 0 0 12px;
    }

    @keyframes rainbow-text {
      from {
        background-position: 0% 50%;
      }

      to {
        background-position: 100% 50%;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      main h1,
      main p {
        animation: none;
        background: none;
        -webkit-text-fill-color: var(--ink);
        color: var(--ink);
      }
    }

    .stamp {
      display: inline-block;
      margin-top: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      background: #fff1d6;
      color: var(--accent);
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <main>
    <h1>Cloud Test</h1>
    <p>This page exists only to test a minimal cloud coding workflow.</p>
    <p>Change this text, push it, and confirm the deployed page updates.</p>
    <div class="stamp">Version 3 hello!</div>
    <div class="stamp">Version 4 BITCHES!</div>
  </main>

  <script>
    const board = document.querySelector('#game-board');
    const target = document.querySelector('#target');
    const scoreDisplay = document.querySelector('#score');
    const timeDisplay = document.querySelector('#time');
    const message = document.querySelector('#message');
    const startButton = document.querySelector('#start-button');

    const roundLength = 10;
    let score = 0;
    let timeLeft = roundLength;
    let timerId;

    function moveTarget() {
      const boardRect = board.getBoundingClientRect();
      const targetSize = target.offsetWidth;
      const padding = targetSize / 2 + 8;
      const x = padding + Math.random() * (boardRect.width - padding * 2);
      const y = padding + Math.random() * (boardRect.height - padding * 2);

      target.style.left = `${x}px`;
      target.style.top = `${y}px`;
    }

    function endGame() {
      clearInterval(timerId);
      target.disabled = true;
      startButton.disabled = false;
      startButton.textContent = 'Play again';
      message.textContent = `Time! You caught ${score} rainbow${score === 1 ? '' : 's'}.`;
    }

    function startGame() {
      score = 0;
      timeLeft = roundLength;
      scoreDisplay.textContent = score;
      timeDisplay.textContent = timeLeft;
      message.textContent = 'Go! Catch the rainbow!';
      target.disabled = false;
      startButton.disabled = true;
      moveTarget();
      target.focus();

      clearInterval(timerId);
      timerId = setInterval(() => {
        timeLeft -= 1;
        timeDisplay.textContent = timeLeft;

        if (timeLeft <= 0) {
          endGame();
        }
      }, 1000);
    }

    target.addEventListener('click', () => {
      if (target.disabled) {
        return;
      }

      score += 1;
      scoreDisplay.textContent = score;
      message.textContent = `Nice! Score: ${score}`;
      moveTarget();
    });

    startButton.addEventListener('click', startGame);
    window.addEventListener('resize', moveTarget);
  </script>
</body>
</html>
